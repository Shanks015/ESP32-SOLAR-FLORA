name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS App
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Java (required for Flutter tasks)
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    - name: Get Dependencies
      run: flutter pub get

    # Create dummy .env file so compilation doesn't crash on asset asset load
    - name: Create dummy .env
      run: |
        echo "SUPABASE_URL=https://dummy-url.supabase.co" > .env
        echo "SUPABASE_ANON_KEY=dummy-key" >> .env

    - name: Build iOS (No Codesign)
      run: flutter build ios --no-codesign
