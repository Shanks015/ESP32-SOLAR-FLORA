<style>
        body { font-family: 'Manrope', sans-serif; min-height: max(884px, 100dvh); }
        .progress-transition { transition: width 2.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .ripple {
            position: absolute;
            border-radius: 50%;
            border: 2px solid #b7c8df; /* secondary-fixed-dim */
            animation: ripple-anim 2s linear infinite;
        }
        @keyframes ripple-anim {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 80px; height: 80px; opacity: 0; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .pulse-ring {
            animation: pulseRing 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulseRing {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(79, 99, 91, 0.3); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(79, 99, 91, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(79, 99, 91, 0); }
        }

        @keyframes slideRight {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md overflow-x-hidden min-h-screen relative pb-24 md:pb-0 pt-16 md:pt-20">
<!-- TopAppBar -->
<header class="w-full top-0 sticky z-40 bg-surface border-b border-outline-variant flex justify-between items-center px-margin-mobile md:px-margin-desktop py-base">
<button class="p-2 text-primary hover:bg-surface-container-high rounded-full transition-colors active:scale-95 flex items-center justify-center">
<span class="material-symbols-outlined text-[24px]">eco</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Solar Flora</h1>
<button class="p-2 text-primary hover:bg-surface-container-high rounded-full transition-colors active:scale-95 flex items-center justify-center">
<span class="material-symbols-outlined text-[24px]">settings</span>
</button>
</header>
<main class="max-w-4xl mx-auto px-margin-mobile md:px-margin-desktop pt-md pb-xl">
<!-- Top Section: Hero Element (Plant) -->
<section class="flex flex-col items-center justify-center py-lg fade-in-up">
<div class="relative flex items-center justify-center w-64 h-64 rounded-full glass-card pulse-ring mb-md bg-surface-container-lowest overflow-hidden">
<!-- Watering Animation State (Hidden by default) -->
<div class="absolute inset-0 flex-col items-center justify-center z-20 hidden backdrop-blur-sm bg-surface/30 rounded-full transition-all duration-500" id="water-anim-zone">
<div class="relative flex items-center justify-center w-24 h-24 mb-4">
<div class="ripple" style="animation-delay: 0s;"></div>
<div class="ripple" style="animation-delay: 0.6s;"></div>
<div class="ripple" style="animation-delay: 1.2s;"></div>
<span class="material-symbols-outlined text-secondary text-4xl z-10 animate-bounce" data-icon="water_drop" data-weight="fill" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
<!-- Progress Bar -->
<div class="w-32 h-1.5 bg-tertiary-container rounded-full overflow-hidden">
<div class="h-full bg-secondary w-0 progress-transition rounded-full" id="water-progress"></div>
</div>
<p class="font-label-sm text-label-sm text-primary mt-3">Hydrating...</p>
</div>
<img class="w-3/4 h-3/4 object-contain drop-shadow-sm pointer-events-none" src="https://lh3.googleusercontent.com/aida/AP1WRLtDT9qJGUFJX8hoSga06y9T98JkOMMpzbcJL-p-41LuuLdzJ3pZOSpe5HjVpuAlZm58HLWyXTyTbsRR0qnwnTuJmDrIr9Vk-WYRHSAaOechtx8Wjk8GCFpm8vFAKkSNF5Zv6pAS9pXQY3PQESYWhKofvYvs84dVysNFUQNNV-sFRcbeVSLaE2PN5YtQRSCJBEuCRIzv4R4f2doSlyWpC9QxWXbR1pyvo0EWZsvUGgvHzMgex4ytRP4tqg0"/>
</div>
<!-- Primary Action -->
<button class="px-10 py-4 bg-primary text-on-primary rounded-full font-label-md text-label-md tracking-wider shadow-sm hover:bg-on-primary-fixed-variant active:scale-95 transition-all duration-300 flex items-center gap-3" id="water-btn">
<span class="material-symbols-outlined text-lg" data-icon="water_drop">water_drop</span>
            WATER NOW
        </button>
</section>
<!-- Center Section: Power Flow / Indicators -->
<section class="py-md fade-in-up delay-100 flex items-center justify-center gap-md md:gap-lg">
<div class="flex flex-col items-center">
<div class="w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center text-primary mb-sm shadow-sm relative">
<!-- Soft light-blue pulsing glow -->

<span class="material-symbols-outlined text-secondary z-10 text-[32px]" data-icon="wb_sunny" data-weight="fill" style="font-variation-settings: 'FILL' 1;">wb_sunny</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Solar</span>
</div>
<!-- Flow Animation Container -->
<div class="flex-1 max-w-[100px] h-1 bg-surface-variant rounded-full relative overflow-hidden hidden md:block">
<div class="absolute top-0 left-0 h-full bg-primary w-1/2 rounded-full animate-[slideRight_2s_linear_infinite]"></div>
</div>

</div>
<div class="flex flex-col items-center">

<div class="w-full h-[85%] bg-primary rounded-[1px]"></div>
</div>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Battery</span>
</div>
</section>

<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center py-sm px-base pb-safe bg-surface-container-low rounded-t-xl border-t border-surface-variant/50">
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-full px-4 py-1 hover:bg-surface-variant active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined mb-1 text-[24px]" data-icon="potted_plant" data-weight="fill" style="font-variation-settings: 'FILL' 1;">potted_plant</span>
<span class="font-label-sm text-label-sm">Status</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-variant active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined mb-1 text-[24px]">solar_power</span>
<span class="font-label-sm text-label-sm">Energy</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant px-4 py-1 hover:bg-surface-variant active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined mb-1 text-[24px]">settings</span>
<span class="font-label-sm text-label-sm">Settings</span>
</button>
</nav>
<script>
    // Simple Interaction Script for the 'Water Now' animation state
    document.addEventListener('DOMContentLoaded', () => {
        const waterBtn = document.getElementById('water-btn');
        const animZone = document.getElementById('water-anim-zone');
        const progress = document.getElementById('water-progress');
        let isWatering = false;

        waterBtn.addEventListener('click', () => {
            if(isWatering) return;
            isWatering = true;
            
            // Style button to active state
            waterBtn.classList.add('opacity-50', 'pointer-events-none');
            
            // Show Animation Overlay
            animZone.classList.remove('hidden');
            animZone.classList.add('flex', 'opacity-100');
            
            // Trigger Progress Bar
            setTimeout(() => {
                progress.style.width = '100%';
            }, 100);

            // Reset after 3 seconds
            setTimeout(() => {
                progress.style.width = '0%';
                animZone.classList.remove('flex', 'opacity-100');
                animZone.classList.add('hidden');
                
                waterBtn.classList.remove('opacity-50', 'pointer-events-none');
                isWatering = false;
            }, 2800);
        });
    });
</script>
</body></html>
